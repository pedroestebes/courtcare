name = "courtcare-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Development settings
[dev]
port = 3001
local_protocol = "http"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "courtcare-db"
database_id = "c799ee01-6cb1-45fe-ad0e-86a05d00a09d"
migrations_dir = "migrations"

# Environment variables
[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "https://courtcare-web.pages.dev,http://localhost:5173"

# Production overrides
[env.production]
name = "courtcare-api"
[env.production.vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://courtcare-web.pages.dev"
